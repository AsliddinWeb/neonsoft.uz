services:
  # ─── PostgreSQL ──────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: neonsoftuz-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${DB_PORT:-5433}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # ─── Backend (FastAPI) ───────────────────────────
  api:
    build:
      context: ./neonsoft_backend
      dockerfile: Dockerfile
    container_name: neonsoftuz-api
    env_file: .env
    environment:
      DATABASE_URL: "postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}"
    volumes:
      - ./neonsoft_backend:/app
      - media_data:/app/media
    ports:
      - "${API_PORT:-8012}:8000"
    depends_on:
      db:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    restart: unless-stopped

  # ─── Frontend (Vue 3 + Vite) ─────────────────────
  frontend:
    build:
      context: ./neonsoft_frontend
      dockerfile: Dockerfile
    container_name: neonsoftuz-frontend
    environment:
      VITE_API_BASE_URL: "http://api:8000"
      VITE_MEDIA_BASE_URL: "http://localhost:${API_PORT:-8012}"
      VITE_APP_NAME: "NeonSoft"
    volumes:
      - ./neonsoft_frontend:/app
      - /app/node_modules
    ports:
      - "${FRONTEND_PORT:-5174}:5174"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  postgres_data:
  media_data:
